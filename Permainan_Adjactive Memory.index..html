<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card (Adjectives Edition)</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #fdcb6e;
            --success: #00b894;
            --danger: #ff4757;
            --card-back: #2d3436;
            --text-color: #ffffff;
            --sea-blue: #005f99;
            --sky-blue: #3498db;
            --accent-orange: #e67e22;
            --light-green: #98fb98;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Menggunakan link background baru yang diberikan */
            background-image: url('https://static.wixstatic.com/media/0428ae_c06723d9bf37427bb4070b3d340de02c~mv2.jpeg/v1/fill/w_980,h_653,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/DSC02159.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }

        .main-wrapper {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 95%;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--secondary);
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .subtitle {
            color: var(--sky-blue);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: none; 
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(152, 251, 152, 0.4); 
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            color: #1b4d1b; 
            border: 2px solid var(--light-green);
        }

        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            background: var(--primary);
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.5);
        }

        button.restart {
            background: var(--accent-orange);
        }

        select {
            padding: 10px;
            border-radius: 12px;
            border: 2px solid white;
            font-size: 1rem;
            outline: none;
            background: var(--accent-orange);
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        select option {
            background: white;
            color: black;
            font-weight: normal;
        }

        .game-board {
            display: grid;
            gap: 15px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .easy { grid-template-columns: repeat(4, 1fr); }
        .medium { grid-template-columns: repeat(4, 1fr); }
        .hard { grid-template-columns: repeat(4, 1fr); }

        @media (min-width: 600px) {
            .easy { grid-template-columns: repeat(4, 1fr); }
            .medium { grid-template-columns: repeat(4, 1fr); }
            .hard { grid-template-columns: repeat(6, 1fr); }
        }

        .card {
            width: 80px;
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        @media (min-width: 600px) {
            .card { width: 115px; height: 150px; }
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        @keyframes shake {
            0% { transform: rotateY(180deg) translateX(0); }
            25% { transform: rotateY(180deg) translateX(-5px) rotateZ(-2deg); }
            50% { transform: rotateY(180deg) translateX(5px) rotateZ(2deg); }
            75% { transform: rotateY(180deg) translateX(-5px) rotateZ(-2deg); }
            100% { transform: rotateY(180deg) translateX(0); }
        }

        .card.shake {
            animation: shake 0.4s ease-in-out;
        }

        .card.shake .card-back {
            border-color: var(--danger);
            background-image: linear-gradient(rgba(255, 71, 87, 0.4), rgba(255, 71, 87, 0.4)), url('https://alfagresalfa.vtexassets.com/arquivos/ids/381908-800-auto?v=638841817070070000&width=800&height=auto&aspect=true');
        }

        .card.matched-visible .card-back {
            background-image: linear-gradient(rgba(0, 184, 148, 0.8), rgba(0, 184, 148, 0.8)), url('https://alfagresalfa.vtexassets.com/arquivos/ids/381908-800-auto?v=638841817070070000&width=800&height=auto&aspect=true');
            color: white !important;
            border-color: var(--success);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        .card-front {
            background-color: var(--card-back);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background-image: url('https://smartcap.or.id/smk.png');
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .card-back {
            background-image: url('https://alfagresalfa.vtexassets.com/arquivos/ids/381908-800-auto?v=638841817070070000&width=800&height=auto&aspect=true');
            background-size: cover;
            background-position: center;
            color: var(--sea-blue);
            transform: rotateY(180deg);
            border: 4px solid var(--primary);
            word-break: break-word;
            text-shadow: 0px 0px 1px rgba(255,255,255,0.8);
            transition: background 0.3s ease, border 0.3s ease;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            color: #2d3436;
        }

        .modal h2 { color: var(--primary); font-size: 2rem; margin-bottom: 15px; }
        .modal p { margin-bottom: 12px; font-size: 1.1rem; color: #636e72; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header">
            <h1>Adjectives Memory</h1>
            <p class="subtitle">Belajar Kata Sifat (English - Indonesia)</p>
        </div>

        <div class="stats-container">
            <div>⏳ <span id="timer">00:00</span></div>
            <div>🎯 <span id="moves">0</span></div>
        </div>

        <div class="controls">
            <select id="difficulty">
                <option value="easy">Mudah (4 Pasang)</option>
                <option value="medium" selected>Sedang (8 Pasang)</option>
                <option value="hard">Sulit (12 Pasang)</option>
            </select>
            <button class="restart" onclick="initGame()">Ulangi Game</button>
        </div>

        <div class="game-board" id="gameBoard"></div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>Hebat! 🎉</h2>
            <p>Kamu sudah mencocokkan semua kata sifat.</p>
            <p>Waktu: <span id="finalTime"></span></p>
            <p>Klik: <span id="finalMoves"></span></p>
            <button onclick="closeModal()">Main Lagi</button>
        </div>
    </div>

    <script>
        const adjectivePairs = [
            { en: "Happy", id: "Senang" },
            { en: "Brave", id: "Berani" },
            { en: "Smart", id: "Pintar" },
            { en: "Kind", id: "Baik Hati" },
            { en: "Strong", id: "Kuat" },
            { en: "Fast", id: "Cepat" },
            { en: "Beautiful", id: "Cantik" },
            { en: "Quiet", id: "Tenang" },
            { en: "Large", id: "Besar" },
            { en: "Small", id: "Kecil" },
            { en: "Funny", id: "Lucu" },
            { en: "Clean", id: "Bersih" },
            { en: "Bright", id: "Terang" },
            { en: "Cold", id: "Dingin" },
            { en: "Warm", id: "Hangat" }
        ];

        let flippedCards = [];
        let moves = 0;
        let timerInterval = null;
        let seconds = 0;
        let isLockBoard = false;
        let matchedPairs = 0;
        let totalPairsNeeded = 0;

        const board = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const timerDisplay = document.getElementById('timer');
        const difficultySelect = document.getElementById('difficulty');
        const winModal = document.getElementById('winModal');

        function initGame() {
            const difficulty = difficultySelect.value;
            let pairCount = 4;
            if (difficulty === 'medium') pairCount = 8;
            if (difficulty === 'hard') pairCount = 12;

            totalPairsNeeded = pairCount;
            resetStats();
            setupBoard(difficulty, pairCount);
        }

        function resetStats() {
            moves = 0;
            seconds = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLockBoard = false;
            movesDisplay.innerText = moves;
            timerDisplay.innerText = "00:00";
            clearInterval(timerInterval);
            startTimer();
        }

        function setupBoard(difficulty, pairCount) {
            board.innerHTML = '';
            board.className = `game-board ${difficulty}`;
            const selectedPairs = [...adjectivePairs].sort(() => 0.5 - Math.random()).slice(0, pairCount);
            let cardData = [];
            selectedPairs.forEach((pair, index) => {
                cardData.push({ text: pair.en, pairId: index });
                cardData.push({ text: pair.id, pairId: index });
            });
            cardData.sort(() => 0.5 - Math.random());
            cardData.forEach(data => {
                board.appendChild(createCard(data.text, data.pairId));
            });
        }

        function createCard(text, pairId) {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.pairId = pairId;
            card.innerHTML = `
                <div class="card-face card-front"></div>
                <div class="card-face card-back">${text}</div>
            `;
            card.addEventListener('click', flipCard);
            return card;
        }

        function flipCard() {
            if (isLockBoard || this === flippedCards[0] || this.classList.contains('matched-visible')) return;
            this.classList.add('flipped');
            flippedCards.push(this);
            if (flippedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            moves++;
            movesDisplay.innerText = moves;
            isLockBoard = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.pairId === card2.dataset.pairId) {
                matchedPairs++;
                card1.classList.add('matched-visible');
                card2.classList.add('matched-visible');
                resetFlipState();
                if (matchedPairs === totalPairsNeeded) endGame();
            } else {
                card1.classList.add('shake');
                card2.classList.add('shake');
                
                setTimeout(() => {
                    card1.classList.remove('flipped', 'shake');
                    card2.classList.remove('flipped', 'shake');
                    resetFlipState();
                }, 800);
            }
        }

        function resetFlipState() {
            flippedCards = [];
            isLockBoard = false;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('finalTime').innerText = timerDisplay.innerText;
            document.getElementById('finalMoves').innerText = moves;
            setTimeout(() => { winModal.style.display = 'flex'; }, 500);
        }

        function closeModal() {
            winModal.style.display = 'none';
            initGame();
        }

        difficultySelect.addEventListener('change', initGame);
        window.onload = initGame;
    </script>
</body>
</html>
